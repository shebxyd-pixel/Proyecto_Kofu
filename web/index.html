<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kofu v0.7 (Beta)</title>
    <link rel="icon" type="image/x-icon" href="Uta icon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Kofu</h1>
                <p class="sidebar-subtitle">v0.7 (Beta)</p>
            </div>

            <div class="mode-selector">
                <label class="mode-label">Modo de IA:</label>
                <div class="mode-toggle">
                    <button id="localModeBtn" class="mode-btn active" data-mode="local">Local</button>
                    <button id="onlineModeBtn" class="mode-btn" data-mode="online">Online</button>
                </div>
            </div>

            <div class="api-config" id="apiConfig">
                <label for="apiKeyInput">API Key (Online):</label>
                <input type="text" id="apiKeyInput" class="api-input" placeholder="Ingresa tu API key...">
            </div>

            <div class="task-counter" id="taskCounter">
                Tareas activas: <span id="activeTasks">0</span>
            </div>

            <button id="shutdownBtn" class="shutdown-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10"/>
                </svg>
                Apagar
            </button>
        </aside>

        <main class="main-content">
            <div class="chat-container" id="chatContainer"></div>

            <div class="input-container">
                <div class="options-bar">
                    <select id="documentType" class="select-input">
                        <option value="">Tipo de documento</option>
                        <option value="word">Word</option>
                        <option value="powerpoint">PowerPoint</option>
                    </select>

                    <select id="templateSelect" class="select-input">
                        <option value="">Plantilla</option>
                    </select>

                    <label class="file-upload-label">
                        <input type="file" id="fileInput" class="file-input" accept=".pdf,.docx,.pptx,.xlsx,.xls,.csv,.txt,.md,.html,.jpg,.jpeg,.png,.gif,.bmp,.tiff,.wav,.mp3,.m4a,.ogg,.flac,.epub,.zip,.msg,.ipynb">
                        <span class="file-upload-text">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                            </svg>
                            Subir archivo
                        </span>
                    </label>
                </div>

                <div id="filePreview" class="file-preview" style="display: none;">
                    <div class="file-info">
                        <span id="fileName" class="file-name"></span>
                        <button id="removeFileBtn" class="remove-file-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 6L6 18M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="input-bar">
                    <textarea 
                        id="messageInput" 
                        placeholder="Escribe tu mensaje..."
                        rows="1"
                    ></textarea>
                    <button id="sendBtn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
